                    <div className="flex flex-1 overflow-hidden relative">

                        <div className="flex-1 flex flex-col min-w-0 bg-slate-50 relative">

                                    <div className="flex flex-wrap items-center gap-2 mb-5">
                                        <span className="bg-blue-600 text-white font-bold px-3 py-1 sm:px-4 py-1.5 rounded-full text-xs sm:text-sm shadow-sm shrink-0">
                                            SOAL {String(soal.displayId).padStart(3, '0')}

                                        <span className="bg-indigo-100 text-indigo-800 font-bold px-2 py-1 sm:px-3 py-1.5 rounded-md text-[10px] sm:text-xs uppercase tracking-wide border border-indigo-200 break-words">
                                            {soal.jenis} • {soal.kategori}
                                        </span>
                                        {isWawancaraLocked && currentIndex >= 135 && (
                                            <span className="bg-red-100 text-red-600 font-bold px-2 py-1 rounded-md text-[10px] sm:text-xs flex items-center gap-1 border border-red-200">
                                                <LockIcon /> Area Wawancara Terkunci

                                    <p className="text-base sm:text-lg text-slate-800 leading-relaxed mb-6 font-medium text-justify">
                                        {soal.pertanyaan}

                                    <div className="space-y-2.5 sm:space-y-3">
                                        {soal.opsi.map((opt) => (
                                            <div key={opt.label} onClick={() => handleAnswer(opt.label)}
                                                className={`p-3 sm:p-4 rounded-xl border-2 flex gap-3 sm:gap-4 items-start 
                                                ${answers[soal.displayId] === opt.label ? 'option-selected' : 'border-slate-200 bg-white'}
                                                ${(isWawancaraLocked && currentIndex < 135) ? 'opacity-80 cursor-not-allowed' : 'option-hover'}`}>
                                                <div className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center shrink-0 font-bold text-xs sm:text-sm ${answers[soal.displayId] === opt.label ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                                    {opt.label}
                                                </div>
                                                <div className="text-slate-700 pt-0.5 sm:pt-1 leading-relaxed text-sm sm:text-base">
                                                    {opt.teks}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white border-t border-slate-200 p-3 sm:p-4 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10 w-full">
                                <div className="max-w-3xl mx-auto flex justify-between items-center w-full gap-2">
                                    <button onClick={() => handleNavRequest(currentIndex - 1)} 
                                        disabled={currentIndex === 0 || (isWawancaraLocked && currentIndex === 135)}
                                        className="px-3 sm:px-5 py-2.5 sm:py-3 rounded-lg font-bold text-xs sm:text-sm border border-slate-300 text-slate-600 hover:bg-slate-50 disabled:opacity-50 flex items-center justify-center flex-1 sm:flex-none">
                                        &lt; <span className="hidden sm:inline ml-1">Sebelumnya</span>
                                    </button>
                                    
                                    <button onClick={toggleRagu} disabled={isWawancaraLocked && currentIndex < 135}
                                        className={`px-3 sm:px-5 py-2.5 sm:py-3 rounded-lg font-bold text-xs sm:text-sm border flex items-center justify-center gap-1.5 sm:gap-2 flex-1 sm:flex-none disabled:opacity-50
                                        ${ragu[soal.displayId] ? 'btn-ragu' : 'border-slate-300 text-slate-600 hover:bg-slate-50'}`}>
                                        <div className={`w-2.5 h-2.5 rounded-full ${ragu[soal.displayId] ? 'bg-orange-500' : 'bg-slate-300'}`}></div> 
                                        Ragu
                                    </button>

                                    <button onClick={() => handleNavRequest(currentIndex + 1)} disabled={currentIndex === soalList.length - 1}
                                        className="px-3 sm:px-5 py-2.5 sm:py-3 rounded-lg font-bold text-xs sm:text-sm bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center flex-1 sm:flex-none transition-colors">
                                        <span className="hidden sm:inline mr-1">{currentIndex === 134 ? 'Masuk Wawancara' : 'Selanjutnya'}</span> &gt;
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="w-72 bg-white border-l border-slate-200 p-4 flex flex-col shrink-0 hidden md:flex z-10">
                            <NavigationMap 
                                soalList={soalList} answers={answers} ragu={ragu} 
                                currentIndex={currentIndex} 
                                onNavRequest={handleNavRequest} 
                                onFinishClick={() => setShowModalSelesai(true)} 
                                isWawancaraLocked={isWawancaraLocked}
                            />
                        </div>
                    </div>

                    {showMobileMenu && (
                        <div className="md:hidden fixed inset-0 z-50 flex justify-end bg-slate-900/60 animate-fade-in backdrop-blur-sm" onClick={() => setShowMobileMenu(false)}>
                            <div className="bg-white w-[85%] max-w-[320px] h-full flex flex-col shadow-2xl animate-slide-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 shrink-0">
                                    <h2 className="font-bold text-slate-800 text-sm">Daftar Soal</h2>
                                    <button onClick={() => setShowMobileMenu(false)} className="p-1.5 bg-slate-200 text-slate-600 rounded-lg hover:bg-slate-300">
                                        <XIcon />
                                    </button>
                                </div>
                                <div className="p-4 flex-1 overflow-hidden flex flex-col">
                                    <NavigationMap 
                                        soalList={soalList} answers={answers} ragu={ragu} 
                                        currentIndex={currentIndex} 
                                        onNavRequest={handleNavRequest} 
                                        onFinishClick={() => { setShowMobileMenu(false); setShowModalSelesai(true); }} 
                                        isWawancaraLocked={isWawancaraLocked}
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {showWawancaraWarning && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[70] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-md w-full border-t-4 border-red-500">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center shrink-0">
                                        <AlertTriangleIcon />
                                    </div>
                                    <h2 className="text-lg sm:text-xl font-bold text-slate-800 leading-tight">Peringatan: Sesi Wawancara</h2>
                                </div>
                                <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6">
                                    <p className="text-sm text-slate-700 leading-relaxed mb-2">
                                        Anda akan memasuki sesi Wawancara (Soal 136 - 145).
                                    </p>
                                    <p className="text-sm font-bold text-red-600 leading-relaxed">
                                        Sesuai aturan CAT BKN, jika Anda melanjutkan, maka seluruh soal sebelumnya (No. 1 - 135) akan DIKUNCI PERMANEN.
                                    </p>
                                    <p className="text-xs text-slate-500 mt-2">Anda tidak akan bisa kembali untuk memperbaiki atau mengubah jawaban pada bagian Teknis, Manajerial, maupun Sosial Kultural.</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <button onClick={() => setShowWawancaraWarning(false)} className="flex-1 py-3 px-4 rounded-xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 text-sm transition-colors">
                                        Batal & Periksa Lagi
                                    </button>
                                    <button onClick={confirmLockWawancara} className="flex-1 py-3 px-4 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 text-sm shadow-md transition-colors flex justify-center items-center gap-2">
                                        <LockIcon /> Ya, Kunci & Lanjut
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModalSelesai && (
                        <div className="fixed inset-0 bg-slate-900/70 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-sm w-full text-center">
                                <div className="w-14 h-14 sm:w-16 sm:h-16 bg-emerald-100 text-emerald-600 rounded-full mx-auto flex items-center justify-center mb-4">
                                    <CheckCircleIcon />
                                </div>
                                <h2 className="text-lg sm:text-xl font-bold text-slate-800 mb-2">Selesaikan Sesi Ujian?</h2>
                                <p className="text-xs sm:text-sm text-slate-600 mb-6">Pastikan kembali seluruh lembar jawaban Anda telah terisi dan tidak ada status ragu-ragu.</p>
                                <div className="flex flex-col-reverse sm:flex-row gap-2 sm:gap-3">
                                    <button onClick={() => setShowModalSelesai(false)} className="flex-1 py-3 sm:py-2.5 rounded-lg bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 text-sm">Kembali Ujian</button>
                                    <button onClick={onFinish} className="flex-1 py-3 sm:py-2.5 rounded-lg bg-emerald-600 text-white font-bold hover:bg-emerald-700 text-sm">Ya, Kumpulkan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Result({ soalList, answers, nama, onRestart }) {
            let scoreTeknis = 0; 
            let scoreManajerial = 0; 
            let scoreSoskul = 0; 
            let scoreWawancara = 0; 

            let totalBenar = 0;
            let totalSalah = 0;
            let totalKosong = 0;

            soalList.forEach(s => {
                const ans = answers[s.displayId];
                
                if (!ans) {
                    totalKosong++;
                    return; 
                }

                const isCorrect = ans === s.kunci;
                const poinDidapat = s.bobot[ans] || 0;

                // STATISTIK: Untuk Non-Teknis, meskipun dapat poin (misal poin 4) tapi bukan kunci (poin 5), dianggap "Salah Kunci Utama" di meteran ini.
                if (isCorrect) {
                    totalBenar++;
                } else {
                    totalSalah++;
                }

                if (s.jenis === 'Teknis') {
                    scoreTeknis += poinDidapat;
                } else if (s.jenis === 'Manajerial') {
                    scoreManajerial += poinDidapat; 
                } else if (s.jenis === 'Sosio-Kultural') {
                    scoreSoskul += poinDidapat;
                } else if (s.jenis === 'Wawancara') {
                    scoreWawancara += poinDidapat;
                }
            });

            const totalScore = scoreTeknis + scoreManajerial + scoreSoskul + scoreWawancara;
            const isLulus = scoreManajerial + scoreSoskul >= 117 && scoreWawancara >= 24; 

            return (
                <div className="min-h-screen bg-slate-50 p-3 sm:p-4 md:p-8">
                    <div className="max-w-4xl mx-auto space-y-4 sm:space-y-6">
                        
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8 text-center relative overflow-hidden">
                            <div className="w-12 h-12 sm:w-16 sm:h-16 bg-emerald-100 text-emerald-600 rounded-full mx-auto flex items-center justify-center mb-3 sm:mb-4">
                                <CheckCircleIcon />
                            </div>
                            <h1 className="text-xl sm:text-2xl font-bold text-slate-800 leading-tight">Evaluasi Hasil CAT BKN</h1>
                            <p className="text-slate-500 text-xs sm:text-sm mt-1 mb-6">Laporan pencapaian nilai riil atas nama <strong>{nama}</strong>.</p>
                            
                            {/* Alert jika ada soal kosong */}
                            {totalKosong > 0 && (
                                <div className="mb-6 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg flex items-center justify-center gap-2">
                                    <AlertTriangleIcon />
                                    Terdapat <strong>{totalKosong} soal tidak dijawab</strong> yang langsung diberikan nilai 0 (Nol).
                                </div>
                            )}

                            {/* Rekap Total Jawaban Benar, Salah, Kosong */}
                            <div className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-8">
                                <div className="flex-1 min-w-[90px] bg-emerald-50 border border-emerald-200 rounded-xl py-3 px-2 sm:px-4 text-center shadow-sm">
                                    <div className="text-emerald-800 text-[10px] sm:text-xs font-bold uppercase mb-1">Benar</div>
                                    <div className="text-2xl sm:text-3xl font-black text-emerald-600">{totalBenar}</div>
                                </div>
                                <div className="flex-1 min-w-[90px] bg-rose-50 border border-rose-200 rounded-xl py-3 px-2 sm:px-4 text-center shadow-sm">
                                    <div className="text-rose-800 text-[10px] sm:text-xs font-bold uppercase mb-1">Salah</div>
                                    <div className="text-2xl sm:text-3xl font-black text-rose-600">{totalSalah}</div>
                                </div>
                                <div className="flex-1 min-w-[90px] bg-slate-100 border border-slate-200 rounded-xl py-3 px-2 sm:px-4 text-center shadow-sm">
                                    <div className="text-slate-600 text-[10px] sm:text-xs font-bold uppercase mb-1">Kosong / Nol</div>
                                    <div className="text-2xl sm:text-3xl font-black text-slate-700">{totalKosong}</div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 sm:mb-8">
                                <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 sm:p-4">
                                    <div className="text-[10px] sm:text-xs font-bold text-blue-800 uppercase mb-1">1. Teknis</div>
                                    <div className="text-xl sm:text-2xl font-bold text-blue-600">{scoreTeknis} Pts</div>
                                    <div className="text-[9px] sm:text-[10px] text-blue-400 mt-1">Maks 450 Poin</div>
                                </div>
                                <div className="bg-teal-50 border border-teal-100 rounded-xl p-3 sm:p-4">
                                    <div className="text-[10px] sm:text-xs font-bold text-teal-800 uppercase mb-1">2. Manajerial</div>
                                    <div className="text-xl sm:text-2xl font-bold text-teal-600">{scoreManajerial} Pts</div>
                                    <div className="text-[9px] sm:text-[10px] text-teal-400 mt-1">Maks 125 Poin</div>
                                </div>
                                <div className="bg-orange-50 border border-orange-100 rounded-xl p-3 sm:p-4">
                                    <div className="text-[10px] sm:text-xs font-bold text-orange-800 uppercase mb-1">3. Sosio-Kultural</div>
                                    <div className="text-xl sm:text-2xl font-bold text-orange-600">{scoreSoskul} Pts</div>
                                    <div className="text-[9px] sm:text-[10px] text-orange-400 mt-1">Maks 100 Poin</div>
                                </div>
                                <div className="bg-purple-50 border border-purple-100 rounded-xl p-3 sm:p-4">
                                    <div className="text-[10px] sm:text-xs font-bold text-purple-800 uppercase mb-1">4. Wawancara</div>
                                    <div className="text-xl sm:text-2xl font-bold text-purple-600">{scoreWawancara} Pts</div>
                                    <div className="text-[9px] sm:text-[10px] text-purple-400 mt-1">Maks 50 Poin</div>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row justify-between items-center border-t border-slate-100 pt-5 sm:pt-6 gap-4">
                                <div className="text-center md:text-left">
                                    <div className="text-xs sm:text-sm font-bold text-slate-500">Total Akumulasi Nilai:</div>
                                    <div className="text-2xl sm:text-3xl font-black text-slate-800">{totalScore} <span className="text-sm sm:text-lg font-normal text-slate-400">/ 725</span></div>
                                </div>
                                <div className={`w-full md:w-auto px-4 py-3 sm:py-2 rounded-lg font-bold border text-xs sm:text-sm ${isLulus ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                    STATUS: {isLulus ? 'LULUS PASSING GRADE' : 'TIDAK LULUS PG'}
                                </div>
                            </div>
                        </div>

                        {/* PEMBAHASAN SECTION */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 md:p-8">
                            <h2 className="text-lg sm:text-xl font-bold text-slate-800 mb-5 border-b pb-3 sm:pb-4 flex items-center gap-2">
                                <InfoIcon />
                                Kunci Jawaban & Rincian Bobot
                            </h2>
                            <div className="space-y-6 sm:space-y-8">
                                {soalList.map((s) => {
                                    const ans = answers[s.displayId];
                                    const isCorrect = ans === s.kunci;
                                    const isBlank = !ans;

                                    let poinDidapat = 0;
                                    if(!isBlank) {
                                        poinDidapat = s.bobot[ans] || 0;
                                    }

                                    return (
                                        <div key={s.displayId} id={`bahas-${s.displayId}`} className="border border-slate-200 rounded-xl overflow-hidden">
                                            <div className="bg-slate-50 px-3 sm:px-4 py-2.5 border-b border-slate-200 flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                                                <span className="text-[10px] sm:text-xs font-bold text-indigo-800 uppercase tracking-wide">
                                                    SOAL {s.displayId} • {s.kategori}
                                                </span>
                                                <span className={`text-[10px] sm:text-xs font-bold px-2 py-1 rounded w-fit 
                                                    ${isCorrect ? 'bg-emerald-100 text-emerald-800' : (isBlank ? 'bg-slate-200 text-slate-600' : 'bg-rose-100 text-rose-800')}`}>
                                                    {isBlank ? 'KOSONG (0 Poin)' : `Didapat: +${poinDidapat} Poin`}
                                                </span>
                                            </div>
                                            <div className="p-4 sm:p-5 space-y-4">
                                                <p className="text-slate-800 font-medium text-sm leading-relaxed text-justify">{s.pertanyaan}</p>
                                                
                                                <div className="space-y-2.5">
                                                    {s.opsi.map(opt => {
                                                        let optClass = "p-3 sm:p-4 rounded-xl border-2 text-xs sm:text-sm flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-3 transition-colors ";
                                                        
                                                        // Opsi yang benar (Kunci 5 Poin)
                                                        if (opt.label === s.kunci) {
                                                            optClass += "bg-emerald-50 border-emerald-500 text-emerald-900 shadow-sm font-semibold";
                                                        } 
                                                        // Opsi salah yang dipilih user
                                                        else if (opt.label === ans && ans !== s.kunci) {
                                                            optClass += "bg-rose-50 border-rose-400 text-rose-900 font-medium opacity-90";
                                                        } 
                                                        // Opsi lainnya
                                                        else {
                                                            optClass += "bg-white border-slate-200 text-slate-600";
                                                        }

                                                        return (
                                                            <div key={opt.label} className={optClass}>
                                                                <div className="flex gap-2 w-full justify-between items-start">
                                                                    <div className="flex gap-2">
                                                                        <span className="shrink-0 w-6 font-bold">{opt.label}.</span>
                                                                        <span className="flex-1 leading-relaxed">{opt.teks}</span>
                                                                    </div>
                                                                    <span className="shrink-0 ml-2 bg-slate-200 text-slate-700 px-2 py-1 rounded text-[10px] font-bold">
                                                                        {s.bobot[opt.label]} Poin
                                                                    </span>
                                                                </div>
                                                                <div className="flex gap-2 mt-2 sm:mt-0 justify-end sm:justify-start w-full sm:w-auto">
                                                                    {opt.label === s.kunci && (
                                                                        <span className="shrink-0 bg-emerald-600 text-white text-[10px] px-2 py-1 rounded-md font-bold uppercase flex items-center gap-1">
                                                                            <TrueCheckIcon /> Kunci Jawaban
                                                                        </span>
                                                                    )}
                                                                    {opt.label === ans && ans !== s.kunci && (
                                                                        <span className="shrink-0 bg-rose-500 text-white text-[10px] px-2 py-1 rounded-md font-bold uppercase flex items-center gap-1">
                                                                            <FalseXIcon /> Jawabanmu
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>

                                                <div className="mt-4 p-4 sm:p-5 bg-indigo-50/50 border border-indigo-100 rounded-xl">
                                                    <h4 className="font-bold text-indigo-800 text-xs sm:text-sm mb-2 flex items-center gap-1.5">
                                                        <InfoIcon /> Pembahasan Analitis
                                                    </h4>
                                                    <p className="text-indigo-900 text-[13px] sm:text-sm leading-relaxed text-justify whitespace-pre-line">
                                                        {s.pembahasan}
                                                    </p>
                                                </div>

                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="mt-8 text-center">
                                <button onClick={onRestart} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-md transition-all text-sm sm:text-base">
                                    Ulangi Latihan Simulasi CAT
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
